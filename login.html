<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Sinus — Entrar</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet"/>
  <link rel="shortcut icon" href="sinus.png" type="image/x-icon">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; font-family: 'Outfit', sans-serif; background: #f5f5f5; }

    .page {
      min-height: 100vh;
      display: flex; align-items: center; justify-content: center;
      padding: 20px;
    }

    .card {
      display: flex;
      width: 100%; max-width: 860px;
      min-height: 540px;
      background: #fff;
      border-radius: 28px;
      overflow: hidden;
      box-shadow: 0 20px 60px rgba(0,0,0,0.10);
    }

    /* ── PAINEL ESQUERDO ── */
    .left-panel {
      width: 340px; flex-shrink: 0;
      background: #111;
      padding: 40px 36px;
      display: flex; flex-direction: column;
      justify-content: space-between;
      position: relative; overflow: hidden;
    }
    .left-canvas {
      position: absolute; inset: 0; pointer-events: none;
    }
    .left-top { position: relative; z-index: 2; }
    .left-logo {
      width: 48px; height: 48px; border-radius: 50%;
      background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.15);
      display: flex; align-items: center; justify-content: center;
      margin-bottom: 0;
    }
    .left-logo img { width: 30px; height: 30px; object-fit: contain; filter: invert(1); }
    .left-bottom { position: relative; z-index: 2; }
    .left-tag {
      font-size: 11px; font-weight: 400; letter-spacing: 2px;
      text-transform: uppercase; color: rgba(255,255,255,0.4);
      margin-bottom: 10px;
    }
    .left-title {
      font-family: 'Playfair Display', serif;
      font-size: 26px; font-weight: 700; color: #fff;
      line-height: 1.25;
    }
    .left-sub {
      font-size: 13px; font-weight: 300; color: rgba(255,255,255,0.45);
      margin-top: 10px; line-height: 1.6;
    }

    /* ── PAINEL DIREITO ── */
    .right-panel {
      flex: 1; padding: 48px 52px;
      display: flex; flex-direction: column; justify-content: center;
    }

    .form-eyebrow {
      font-size: 11px; font-weight: 600; letter-spacing: 2.5px;
      text-transform: uppercase; color: #888; margin-bottom: 10px;
    }
    .form-title {
      font-family: 'Playfair Display', serif;
      font-size: 28px; font-weight: 700; color: #111;
      margin-bottom: 6px;
    }
    .form-sub {
      font-size: 13px; font-weight: 300; color: #999;
      margin-bottom: 36px; line-height: 1.5; max-width: 280px;
    }

    .field { margin-bottom: 18px; }
    .field label {
      display: block; font-size: 12px; font-weight: 500;
      color: #555; margin-bottom: 7px; letter-spacing: 0.2px;
    }
    .field-wrap { position: relative; }
    .field input {
      width: 100%; padding: 13px 16px;
      border: 1.5px solid #e5e5e5; border-radius: 12px;
      font-size: 14px; font-family: 'Outfit', sans-serif; font-weight: 300;
      color: #111; outline: none; transition: border-color 0.2s;
      background: #fafafa;
    }
    .field input:focus { border-color: #111; background: #fff; }
    .field input::placeholder { color: #bbb; }
    .eye-btn {
      position: absolute; right: 14px; top: 50%; transform: translateY(-50%);
      background: none; border: none; cursor: pointer; color: #bbb; font-size: 16px;
      line-height: 1; padding: 0;
    }
    .eye-btn:hover { color: #111; }

    .error-msg {
      font-size: 12px; color: #e55; margin-top: -10px; margin-bottom: 14px;
      display: none; padding-left: 2px;
    }
    .error-msg.show { display: block; }

    .submit-btn {
      width: 100%; padding: 14px;
      background: #111; color: #fff; border: none; border-radius: 12px;
      font-size: 15px; font-weight: 500; font-family: 'Outfit', sans-serif;
      cursor: pointer; transition: all 0.2s; margin-top: 4px;
      display: flex; align-items: center; justify-content: center; gap: 8px;
    }
    .submit-btn:hover { background: #333; transform: translateY(-1px); }
    .submit-btn:disabled { opacity: 0.4; cursor: default; transform: none; }

    .spinner {
      width: 16px; height: 16px; border: 2px solid rgba(255,255,255,0.3);
      border-top-color: #fff; border-radius: 50%;
      animation: spin 0.7s linear infinite; display: none;
    }
    .submit-btn.loading .spinner { display: block; }
    .submit-btn.loading .btn-text { opacity: 0.6; }

    .divider {
      display: flex; align-items: center; gap: 12px;
      margin: 24px 0; color: #ddd; font-size: 12px; color: #bbb;
    }
    .divider::before, .divider::after {
      content: ''; flex: 1; height: 1px; background: #eee;
    }

    .toggle-row {
      text-align: center; font-size: 13px; color: #888; font-weight: 300;
    }
    .toggle-btn {
      background: none; border: none; cursor: pointer;
      color: #111; font-weight: 600; font-family: 'Outfit', sans-serif;
      font-size: 13px; text-decoration: underline; padding: 0; margin-left: 4px;
    }
    .toggle-btn:hover { color: #555; }

    /* signup extra field — hidden initially */
    .field.signup-only { display: none; }

    /* responsive */
    @media (max-width: 640px) {
      .left-panel { display: none; }
      .right-panel { padding: 40px 28px; }
      .card { border-radius: 20px; }
    }

    .google-btn {
      width: 100%; padding: 13px 16px;
      background: #fff; color: #111;
      border: 1.5px solid #e5e5e5; border-radius: 12px;
      font-size: 14px; font-weight: 500; font-family: 'Outfit', sans-serif;
      cursor: pointer; transition: all 0.2s;
      display: flex; align-items: center; justify-content: center; gap: 10px;
    }
    .google-btn:hover { border-color: #bbb; background: #fafafa; transform: translateY(-1px); }
    .google-btn:disabled { opacity: 0.4; cursor: default; transform: none; }
    .google-icon { width: 18px; height: 18px; flex-shrink: 0; }

    @keyframes spin { to { transform: rotate(360deg); } }
    @keyframes fadeUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

    .card { animation: fadeUp 0.5s ease both; }
  </style>
</head>

        <div class="field signup-only" id="field-name">

  <!-- Firebase SDKs -->
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
  <script src="firebase-config.js"></script>

  <script>
    /* ── INIT FIREBASE ── */
    firebase.initializeApp(FIREBASE_CONFIG);
    const auth = firebase.auth();

    /* Se já está logado, vai direto pro chat */
    auth.onAuthStateChanged(user => {
      if (user) window.location.href = 'index.html';
    });

    /* ── DOT CANVAS no painel esquerdo ── */
    const lc  = document.getElementById('left-canvas');
    const lct = lc.getContext('2d');
    function drawLeftDots() {
      lc.width  = lc.parentElement.offsetWidth;
      lc.height = lc.parentElement.offsetHeight;
      lct.clearRect(0, 0, lc.width, lc.height);
      for (let r = 0; r * 14 < lc.height; r++) {
        for (let c = 0; c * 14 < lc.width; c++) {
          lct.beginPath();
          lct.arc(c * 14, r * 14, 1.2, 0, Math.PI * 2);
          lct.fillStyle = 'rgba(255,255,255,0.12)';
          lct.fill();
        }
      }
    }
    drawLeftDots();
    window.addEventListener('resize', drawLeftDots);

    /* ── MODO: login ↔ cadastro ── */
    var isSignup = false;
    function toggleMode() {
      isSignup = !isSignup;
      document.querySelectorAll('.signup-only').forEach(el => {
        el.style.display = isSignup ? 'block' : 'none';
      });
      document.getElementById('form-eyebrow').textContent = isSignup ? 'Criar sua conta' : 'Bem-vindo de volta';
      document.getElementById('form-title').textContent   = isSignup ? 'Cadastrar' : 'Entrar na conta';
      document.getElementById('form-sub').textContent     = isSignup
        ? 'Preencha os dados abaixo para começar a usar o Sinus.'
        : 'Digite seu e-mail e senha para acessar o Sinus.';
      document.getElementById('btn-text').textContent     = isSignup ? 'Criar conta' : 'Entrar';
      document.getElementById('toggle-label').textContent = isSignup ? 'Já tem conta?' : 'Não tem conta?';
      document.getElementById('toggle-btn').textContent   = isSignup ? 'Entrar' : 'Criar conta';
      clearError();
    }

    function togglePassword() {
      const inp = document.getElementById('input-password');
      inp.type = inp.type === 'password' ? 'text' : 'password';
    }

    function showError(msg) {
      const el = document.getElementById('error-msg');
      el.textContent = msg; el.classList.add('show');
    }
    function clearError() {
      document.getElementById('error-msg').classList.remove('show');
    }

    function setLoading(on) {
      const btn = document.getElementById('submit-btn');
      btn.classList.toggle('loading', on);
      btn.disabled = on;
    }

    /* ── SUBMIT ── */
    async function handleSubmit() {
      clearError();
      const email    = document.getElementById('input-email').value.trim();
      const password = document.getElementById('input-password').value;
      const name     = document.getElementById('input-name').value.trim();

      if (!email || !password) { showError('Preencha e-mail e senha.'); return; }
      if (isSignup && !name)   { showError('Digite seu nome.'); return; }
      if (password.length < 6) { showError('Senha deve ter pelo menos 6 caracteres.'); return; }

      setLoading(true);
      try {
        if (isSignup) {
          const cred = await auth.createUserWithEmailAndPassword(email, password);
          await cred.user.updateProfile({ displayName: name });
        } else {
          await auth.signInWithEmailAndPassword(email, password);
        }
        window.location.href = 'index.html';
      } catch (err) {
        const msgs = {
          'auth/user-not-found':    'Nenhuma conta com esse e-mail.',
          'auth/wrong-password':    'Senha incorreta.',
          'auth/email-already-in-use': 'Esse e-mail já está cadastrado.',
          'auth/invalid-email':     'E-mail inválido.',
          'auth/weak-password':     'Senha muito fraca. Use pelo menos 6 caracteres.',
          'auth/too-many-requests': 'Muitas tentativas. Tente novamente mais tarde.',
          'auth/invalid-credential':'E-mail ou senha incorretos.',
        };
        showError(msgs[err.code] || 'Ocorreu um erro. Tente novamente.');
        setLoading(false);
      }
    }

    /* ── GOOGLE LOGIN ── */
    async function handleGoogle() {
      const btn = document.getElementById('google-btn');
      btn.disabled = true;
      btn.innerHTML = '<div class="spinner" style="display:block;border-color:rgba(0,0,0,0.15);border-top-color:#111"></div> Aguarde...';
      clearError();
      try {
        const provider = new firebase.auth.GoogleAuthProvider();
        await auth.signInWithPopup(provider);
        window.location.href = 'index.html';
      } catch (err) {
        const msgs = {
          'auth/popup-closed-by-user': 'Janela fechada. Tente novamente.',
          'auth/popup-blocked': 'Pop-up bloqueado pelo navegador. Permita pop-ups para este site.',
        };
        showError(msgs[err.code] || 'Erro ao entrar com Google. Tente novamente.');
        btn.disabled = false;
        btn.innerHTML = `<svg class="google-icon" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/></svg> Continuar com Google`;
      }
    }
    document.addEventListener('keydown', e => { if (e.key === 'Enter') handleSubmit(); });
  </script>
